<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Price Estimator</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">

    <header class="header">
      <div class="header-left">
        <h1>Instant Price <span>Estimate</span></h1>
        <p>Configure your project and get a live price in seconds.</p>
      </div>
      <div class="header-right">
        <div class="header-badge">Live pricing</div>
        <div class="footer-note">Prices are estimates and may vary based on project requirements.</div>
      </div>
    </header>

    <div class="layout">

      <div id="form"></div>

      <div class="price-box">
        <div class="price-label">Estimated total</div>
        <h2 class="price-title" id="price">€0</h2>

        <div id="summary"></div>

        <button onclick="copyQuote()" class="copy-btn">Copy quote</button>

        <div class="or-divider">or send it</div>

        <div class="lead-form">
          <input type="text"  id="leadName"  placeholder="Your name" />
          <input type="email" id="leadEmail" placeholder="Your email" />
          <button id="sendBtn" class="send-btn" onclick="sendQuote()">Send Quote</button>
        </div>
        <div id="successMessage" style="
            display:none;
            margin-top:12px;
            padding:14px;
            border-radius:10px;
            background:#ecfdf5;
            border:1px solid #10b981;
            color:#065f46;
            font-weight:500;
            ">
            ✅ Quote sent successfully! Check your email.
        </div>
      </div>

    </div>

  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>
    emailjs.init("FHv5TOrho2FzjuHXQ");
  </script>

</body>
</html>
